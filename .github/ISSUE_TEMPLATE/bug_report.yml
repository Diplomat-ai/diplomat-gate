name: Bug Report
description: Report a bug in diplomat-gate
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        For security vulnerabilities, **do not use this form** — see [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear, concise description of the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest Python snippet that reproduces the issue.
        Include the `gate.evaluate()` call, input dict, and policy config.
      placeholder: |
        from diplomat_gate import Gate
        gate = Gate(...)
        result = gate.evaluate({"tool": "...", "args": {...}})
        # actual vs expected
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What verdict / behavior did you expect?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Payment policy
        - Email policy
        - Core engine / Gate.evaluate()
        - Audit trail (SQLite)
        - Review queue
        - Adapters (OpenAI / Anthropic / LangChain)
        - CLI (diplomat-gate audit)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: diplomat-gate version
      placeholder: "0.3.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, install method (pip / editable), any extras installed
      placeholder: "macOS 14, pip install diplomat-gate[yaml], Python 3.11"
